# AllShopTotal CRM — Render Blueprint
# Deploy: connect GitHub repo to Render

databases:
  - name: allshoptotal-db
    region: ohio
    plan: free
    databaseName: crm_db
    user: crm_user
    ipAllowList: []

services:
  # ── Backend: Django REST API ──
  - type: web
    name: allshoptotal
    region: ohio
    env: docker
    plan: free
    branch: master
    repo: https://github.com/ALVARRB/allshoptotal
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DBNAME
        fromDatabase:
          name: allshoptotal-db
          property: database
      - key: DBUSER
        fromDatabase:
          name: allshoptotal-db
          property: user
      - key: DBPASSWORD
        fromDatabase:
          name: allshoptotal-db
          property: password
      - key: DBHOST
        fromDatabase:
          name: allshoptotal-db
          property: host
      - key: DBPORT
        fromDatabase:
          name: allshoptotal-db
          property: port
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: DOMAIN_NAME
        value: "https://allshoptotal.onrender.com"
      - key: CORS_ALLOW_ALL
        value: "True"
      - key: ENV_TYPE
        value: "render"
      - key: CELERY_BROKER_URL
        value: ""
      - key: CELERY_RESULT_BACKEND
        value: ""
      - key: DJANGO_CELERY_BROKER_URL
        value: ""
      - key: DEFAULT_FROM_EMAIL
        value: "noreply@allshoptotal.com"
      - key: ADMIN_EMAIL
        value: "admin@allshoptotal.com.br"
      - key: ADMIN_PASSWORD
        value: "admin"
      - key: PUBLIC_DJANGO_API_URL
        value: "https://allshoptotal.onrender.com"

  # ── Frontend: SvelteKit SPA ──
  - type: web
    name: allshoptotal-frontend
    region: ohio
    env: docker
    plan: free
    branch: master
    repo: https://github.com/ALVARRB/allshoptotal
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      - key: PUBLIC_DJANGO_API_URL
        value: "https://allshoptotal.onrender.com"
      - key: NODE_ENV
        value: "production"
      - key: GOOGLE_CLIENT_ID
        value: ""
      - key: GOOGLE_LOGIN_DOMAIN
        value: "https://allshoptotal-frontend.onrender.com"